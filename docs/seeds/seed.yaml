goal: >
  Build a "Daily Drive" Spotify playlist generator: a TypeScript/Node tool, run
  every morning via GitHub Actions cron, that rebuilds a single persistent
  public Spotify playlist by interleaving N selected podcast episodes with
  songs sourced from the user's Spotify activity, following an n+1 song
  pattern between podcasts. Default N = 8.

constraints:
  language_runtime:
    - TypeScript on Node.js (LTS, currently 22.x)
    - Package manager: npm (package-lock.json is committed)
  deployment:
    - GitHub Actions cron + workflow_dispatch trigger
    - No long-running server; one-shot CLI invocation per run
    - Stateless: no run state is persisted between runs
  external_dependencies:
    - Spotify Web API
    - One-time OAuth flow tool (src/SpotifyBootstrapAuth.ts) to capture
      refresh_token; also auto-creates the Daily Drive playlist if missing
      and prints its id
    - Required env vars (also stored as GitHub Actions secrets):
        - SPOTIFY_CLIENT_ID
        - SPOTIFY_CLIENT_SECRET
        - SPOTIFY_REFRESH_TOKEN
        - SPOTIFY_PLAYLIST_ID
    - Optional env vars (defaulted in src/config.ts):
        - SPOTIFY_REDIRECT_URI  (default http://127.0.0.1:8888/callback)
        - PODCASTS_CONFIG_PATH  (default podcasts.toml)
  spotify_oauth_scopes:
    - playlist-modify-private
    - playlist-modify-public
    - playlist-read-collaborative
    - playlist-read-private
    - user-library-read
    - user-read-recently-played
    - user-read-playback-position
    - user-top-read
  input_data:
    - podcasts.toml is a hand-maintained config in the repo root; it was
      seeded once from /Users/rparris/Downloads/PocketCasts.opml but is now
      the source of truth for which shows are eligible. No on-the-fly
      regeneration.
  no_external_db: true
  no_run_state_persisted: true
  no_song_dedup_across_days: true
  no_podcast_duration_cap: true
  no_total_playlist_length_cap: true

acceptance_criteria:
  config:
    - podcasts.toml lists each show with these fields:
        - name (string, required)
        - spotify_show_id (string, required)
        - category ('news' | 'other', required)
        - itunes_categories (string[], optional)
        - pin_slot (positive integer, optional; max = number_of_podcasts)
    - Up First from NPR has category=news and pin_slot=1
    - The Daily has category=news and pin_slot=2
    - Other shows have no pin_slot (eligible for random "other" slots 3..N)
  playlist_structure:
    - number_of_podcasts (N) = 8 by default; surfaced as a single constant
      in code, not yet env-driven
    - Output is N podcast episodes interleaved with songs in the pattern
      Pod1, 2 songs, Pod2, 3 songs, ..., PodN, (N+1) songs
      (n+1 songs after the nth podcast); the playlist always ends with a
      block of songs.
    - For N=8: 8 podcasts + 44 songs = 52 items total. Songs needed for
      arbitrary N: sum(2..N+1) = (N+1)(N+2)/2 - 1
    - All N podcast episodes are present on Spotify; missing/unavailable
      shows are silently skipped and replaced by the next eligible candidate
  episode_selection_rules:
    - Slot 1 episode is the latest Up First episode released within the last
      48 hours AND not fully_played (per resume_point.fully_played). If
      Up First fails this check, fall back through a configurable news
      priority list (default order, filtered to shows present in
      podcasts.toml: NPR News Now, Today Explained, Throughline,
      FiveThirtyEight Politics).
    - Slot 2 episode follows the same rule for The Daily, with the same
      news fallback chain (excluding any show already used in slot 1).
    - Slots 3..N are chosen via `_.sampleSize` over the set of "other"
      shows that have at least one episode released within the last 3
      months AND not fully_played.
    - The chosen episode within any show is the latest available episode
      that satisfies the freshness + not-fully-played filter (no weighting,
      no in-show random pick).
    - Selection is stateless. Repetitiveness is avoided naturally by the
      random show sample + Spotify's fully_played filter; no state.json,
      no back-to-back avoidance, no longest-not-heard ranking.
  song_selection_rules:
    - Songs interleaved between podcasts are drawn from a unified candidate
      pool sourced from (matches src/SpotifyTracks.ts):
        - playlists: random 5 of the user's playlists, tracks deduped and
          sampled (~10 tracks). Per-playlist tracks are cached at
          .cache/spotify-playlist-tracks.json keyed by snapshot_id.
        - top_tracks: short_term + medium_term + long_term, deduped and
          sampled (~10 tracks)
        - recently_played: last 50, deduped and sampled (~10 tracks)
        - saved: 5 random pages of 5 from saved tracks, deduped and
          sampled (~10 tracks)
    - The candidate pool is globally deduped by spotify_track_id and sized
      to >= songs_needed (44 for N=8). Oversample modestly for safety.
    - Songs within a single playlist are unique.
    - No deduplication across days; songs may repeat day to day.
  playlist_publication:
    - A single persistent public Spotify playlist (SPOTIFY_PLAYLIST_ID env)
      is rewritten on every run: all existing items removed, new items
      added in order.
    - On bootstrap (`npm run bootstrap-auth`):
        - the script always prints the refresh_token; AND
        - if SPOTIFY_PLAYLIST_ID is unset or invalid, the script creates a
          public playlist named "Daily Drive" and prints its id for the
          user to paste into .env / GH secrets.
    - Playlist description is updated each run to include the run date and
      a summary of the selected podcasts.
  scheduling_and_runtime:
    - GitHub Actions workflow runs daily at 10:00 UTC (~06:00 EDT /
      ~05:00 EST). DST drift is accepted; documented in README.
    - workflow_dispatch is supported with optional input `dry_run`
      (default false) to log the planned playlist without modifying
      Spotify.
    - Workflow fails loudly (non-zero exit + GH step summary annotations)
      if Spotify auth fails or if fewer than N playable podcasts can be
      found.
  observability:
    - Every run prints the structured plan (selected shows with episode
      titles + durations, song manifest with artist + source) to stdout
      AND to the GH Actions job summary, dry-run or not.
    - Skipped shows are listed with a one-line reason (not on Spotify,
      no fresh episode, already played, etc.).
  testability:
    - Spotify access is abstracted behind an interface (SpotifyGateway) so
      selection algorithms can be unit-tested with fixtures.
    - Vitest is the test framework.
    - `npm test` runs the suite locally and in CI.

ontology_schema:
  name: SpotifyDailyDrive
  description: >
    Domain model for the Daily Drive generator: shows, episodes, tracks,
    and the daily plan that interleaves them.
  fields:
    - name: ShowConfig
      type: object
      description: One entry in podcasts.toml (see src/PodcastConfig.ts)
      sub_fields:
        - { name: name,              type: string }
        - { name: spotify_show_id,   type: string }
        - { name: category,          type: "'news' | 'other'" }
        - { name: itunes_categories, type: "string[] | undefined" }
        - { name: pin_slot,          type: "number | undefined" }
    - name: EpisodeCandidate
      type: object
      description: A specific episode considered for a slot
      sub_fields:
        - { name: show_id,            type: string }
        - { name: spotify_episode_id, type: string }
        - { name: title,              type: string }
        - { name: release_date,       type: "ISO date string" }
        - { name: duration_ms,        type: number }
        - { name: fully_played,       type: boolean }
    - name: TrackCandidate
      type: object
      description: A track in the unified song pool with provenance
      sub_fields:
        - { name: spotify_track_id, type: string }
        - { name: name,             type: string }
        - { name: artists,          type: "string[]" }
        - { name: source,           type: "'playlists' | 'top_tracks' | 'recently_played' | 'saved'" }
    - name: DailyDrivePlan
      type: object
      description: The ordered output of the selection algorithm
      sub_fields:
        - { name: items,        type: "(PodcastSlot | SongRun)[]" }
        - { name: generated_at, type: "ISO datetime" }
        - { name: dry_run,      type: boolean }

evaluation_principles:
  - name: faithful_to_pattern
    weight: 0.25
    description: >
      The N-podcast / n+1-songs interleave pattern is honored exactly; the
      output playlist has N + sum(2..N+1) items in the prescribed order,
      always ending with a block of songs.
  - name: correct_episode_rules
    weight: 0.20
    description: >
      News shows are filtered to <=48h fresh + not fully_played; other
      shows to <=3 months fresh + not fully_played; latest available
      eligible episode is chosen per show.
  - name: graceful_degradation
    weight: 0.20
    description: >
      Missing shows / unavailable episodes / depleted song sources never
      crash the run; the algorithm substitutes the next eligible item and
      logs the substitution.
  - name: testability
    weight: 0.15
    description: >
      Selection logic is pure, deterministic given fixtures, and covered
      by vitest unit tests independent of the Spotify network.
  - name: reproducibility_in_ci
    weight: 0.10
    description: >
      The same code reliably executes in GH Actions; auth is non-
      interactive using refresh_token.
  - name: developer_ergonomics
    weight: 0.05
    description: >
      First-time setup is documented end-to-end: create Spotify app, run
      `npm run bootstrap-auth`, paste callback URL, capture refresh token
      + playlist id, paste secrets into GH. podcasts.toml is straightforward
      to hand-edit.
  - name: code_quality
    weight: 0.05
    description: >
      Strict TypeScript, small focused modules, no god-files.

exit_conditions:
  - All acceptance_criteria pass under fixture-driven vitest tests
  - End-to-end manual run against the real Spotify API produces a valid
    public playlist matching the pattern
  - GitHub Actions workflow successfully runs on schedule for two
    consecutive days
  - README documents setup, configuration, and troubleshooting

