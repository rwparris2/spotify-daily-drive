name: Daily Drive

on:
  # Triggered by the Cloudflare Worker in cron-trigger/ — GitHub's own scheduled runs
  # were 2–5h late, so the schedule lives there now.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-drive
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm start
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SPOTIFY_PLAYLIST_ID: ${{ secrets.SPOTIFY_PLAYLIST_ID }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LISTENBRAINZ_USER_TOKEN: ${{ secrets.LISTENBRAINZ_USER_TOKEN }}
      - name: Commit refreshed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .cache/
          git diff --cached --quiet || git commit -m "chore(cache): refresh caches [skip ci]"
          git push
